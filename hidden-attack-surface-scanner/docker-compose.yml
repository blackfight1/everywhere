version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hass-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hass
      POSTGRES_USER: hass
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hass"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hass-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hass
      DB_USER: hass
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      INTERACTSH_SERVER: ${INTERACTSH_SERVER:-}
      INTERACTSH_TOKEN: ${INTERACTSH_TOKEN:-}
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./configs:/app/configs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hass-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8082:80"

volumes:
  pg_data:
